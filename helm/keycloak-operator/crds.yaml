############################################################
# Keycloak (Operator-managed Keycloak server)
############################################################
apiVersion: k8s.keycloak.org/v1
kind: Keycloak
metadata:
  name: keycloak
spec:
  instances: 1

  image: quay.io/keycloak/keycloak:26.6.1

  http:
    httpEnabled: true
    httpPort: 8080

  hostname:
    hostname: keycloak.local
    strict: false
    strictBackchannel: false

  proxy:
    headers: xforwarded

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

  # Default embedded H2 (OK for dev)
  # For prod, switch to external Postgres (see note below)

---
############################################################
# Realm Import (csoc-realm)
############################################################
apiVersion: k8s.keycloak.org/v1
kind: KeycloakRealmImport
metadata:
  name: csoc-realm
spec:
  keycloakCRName: keycloak

  realm:
    realm: csoc-realm
    enabled: true
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false

    ########################################################
    # Client
    ########################################################
    clients:
      - clientId: csoc-client
        protocol: openid-connect
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        redirectUris:
          - http://localhost:3000/*
        webOrigins:
          - http://localhost:3000

        protocolMappers:
          - name: roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
            config:
              claim.name: roles
              multivalued: "true"
              access.token.claim: "true"
              id.token.claim: "true"
              userinfo.token.claim: "true"

          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            config:
              claim.name: groups
              full.path: "false"
              access.token.claim: "true"
              id.token.claim: "true"
              userinfo.token.claim: "true"

    ########################################################
    # Roles
    ########################################################
    roles:
      realm:
        - name: csoc-role
          description: CSOC application role

    ########################################################
    # Groups
    ########################################################
    groups:
      - name: csoc-group

    ########################################################
    # Identity Provider (Google)
    ########################################################
    identityProviders:
      - alias: google
        providerId: google
        enabled: true
        trustEmail: true
        firstBrokerLoginFlowAlias: first broker login
        config:
          clientId: ${GOOGLE_CLIENT_ID}
          clientSecret: ${GOOGLE_CLIENT_SECRET}
          prompt: select_account

    ########################################################
    # Users (email-only, Google login)
    ########################################################
    users:
      - username: john@example.com
        email: john@example.com
        enabled: true
        emailVerified: true
        groups:
          - csoc-group
