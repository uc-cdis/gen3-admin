# AWS k3s Workshop Values
# Overrides for running CSOC portal on k3s in AWS

replicaCount: 1

image:
  pullPolicy: IfNotPresent
  api:
    repository: quay.io/cdis/csoc-api
    tag: "feat/bootstrap-onboarding-impl"
  frontend:
    repository: quay.io/cdis/csoc-frontend
    tag: "feat/bootstrap-onboarding-impl"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

api:
  workingDir: /go/src/api
  env:
    MOCK_AUTH: "true"
  ports:
    http: 8002
    grpc: 50051
  livenessProbe:
    httpGet:
      path: /ping
      port: 8002
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  resources:
    limits:
      memory: "256Mi"
      cpu: "500m"
    requests:
      memory: "32Mi"
      cpu: "100m"
  volumeMounts:
    - name: data-volume
      mountPath: /go/src/api/certs

frontend:
  ports:
    http: 3000
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  env:
    NEXTAUTH_URL: "http://csoc.aws"
    NEXTAUTH_SECRET: "test-secret-change-in-production"
    NEXTAUTH_JWT_SECRET: "test-jwt-secret-change-in-production"
    MOCK_AUTH: "true"
    ENABLE_MOCK_AUTH: "true"
  resources:
    limits:
      memory: "256Mi"
      cpu: "250m"
    requests:
      memory: "32Mi"
      cpu: "50m"

persistence:
  enabled: true
  name: csoc-pvc
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  storageClassName: ""
  annotations: {}

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP

  grpc:
    port: 50051
    targetPort: 50051
    type: NodePort

  frontend:
    port: 80
    targetPort: 3000

  api:
    port: 8002
    targetPort: 8002

# Traefik ingress for k3s
ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: "csoc.aws"
      paths:
        - path: /api/auth
          pathType: Prefix
          backend:
            service:
              name: csoc
              port:
                name: frontend
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: csoc
              port:
                number: 8002
        - path: /
          pathType: Prefix
          backend:
            service:
              name: csoc
              port:
                name: frontend
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false

volumes:
  config:
    name: config-volume
    configMapName: csoc
  data:
    name: data-volume
    pvcName: csoc-pvc

volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
